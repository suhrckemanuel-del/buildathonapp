<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterestMatch — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #080808; color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  .screen {
    min-height: 100dvh; max-width: 430px; margin: 0 auto;
    padding: 0 26px 48px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }

  /* ── Wavy decoration ── */
  .wave { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  /* ── Top bar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 52px 0 0; position: relative; z-index: 1;
  }
  .logo-btn {
    width: 46px; height: 46px; border-radius: 14px;
    background: #161616; border: 1px solid #252525;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: background 120ms;
  }
  .logo-btn:hover { background: #202020; }
  .logo-btn svg { width: 22px; height: 22px; color: #fff; }
  .signup-link {
    font-size: 14px; font-weight: 700; color: #fff; text-decoration: none;
    padding: 10px 20px; border-radius: 99px;
    background: #161616; border: 1px solid #252525;
    transition: background 120ms; letter-spacing: -0.01em;
  }
  .signup-link:hover { background: #202020; }

  /* ── Main content ── */
  .main {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    position: relative; z-index: 1; padding-top: 52px;
  }

  h1 { font-size: 52px; font-weight: 900; color: #fff; line-height: 1.0; letter-spacing: -0.035em; margin-bottom: 44px; }

  /* ── Fields ── */
  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .field label { font-size: 11.5px; font-weight: 600; color: #555; letter-spacing: 0.07em; text-transform: uppercase; }
  .field input {
    height: 58px; background: #141414; border: 1.5px solid #252525;
    border-radius: 18px; padding: 0 22px;
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; color: #fff;
    outline: none; transition: border-color 150ms;
  }
  .field input:focus { border-color: #444; }
  .field input::placeholder { color: #383838; }

  /* ── Gradient-border button ── */
  .btn-grad-wrap {
    margin-top: 10px; padding: 2px; border-radius: 20px;
    background: linear-gradient(135deg, #9333ea 0%, #ec4899 40%, #f97316 80%, #ef4444 100%);
  }
  .btn-signin {
    width: 100%; height: 58px; background: #141414; border: none; border-radius: 18px;
    font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 800; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    letter-spacing: -0.02em; transition: background 120ms;
  }
  .btn-signin:hover { background: #1e1e1e; }
  .btn-signin:active { background: #0e0e0e; }
  .btn-signin svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* ── Divider ── */
  .divider { display: flex; align-items: center; gap: 14px; margin: 30px 0; }
  .divider-line { flex: 1; height: 1px; background: #1e1e1e; }
  .divider span { font-size: 12px; font-weight: 500; color: #444; white-space: nowrap; }

  /* ── Social row ── */
  .social-row { display: flex; justify-content: center; gap: 14px; }
  .social-btn {
    width: 58px; height: 58px; border-radius: 16px;
    background: #141414; border: 1.5px solid #252525;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 120ms, border-color 120ms;
  }
  .social-btn:hover { background: #1e1e1e; border-color: #333; }
  .social-btn svg { width: 22px; height: 22px; }

  /* ── Bottom nudge ── */
  .bottom-nudge { position: relative; z-index: 1; text-align: center; margin-top: 32px; font-size: 13px; color: #444; font-weight: 500; }
  .bottom-nudge a { color: #9333ea; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<main class="screen" role="main">

  <!-- Wavy decorative line -->
  <svg class="wave" viewBox="0 0 430 844" fill="none" aria-hidden="true">
    <defs>
      <linearGradient id="wg" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#f97316" stop-opacity="0.95"/>
        <stop offset="45%"  stop-color="#ef4444" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#ec4899" stop-opacity="0.5"/>
      </linearGradient>
    </defs>
    <path
      d="M -10 680 C 55 590, 130 640, 185 500 C 240 360, 270 430, 330 300 C 375 210, 410 240, 450 160"
      stroke="url(#wg)" stroke-width="2.5" fill="none" stroke-linecap="round"
    />
  </svg>

  <!-- Top bar -->
  <header class="topbar">
    <a href="01-splash.html" class="logo-btn" aria-label="Back to home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
        <path d="M8 12h.01M12 12h.01M16 12h.01"/>
      </svg>
    </a>
    <a href="02-signup.html" class="signup-link">Sign Up</a>
  </header>

  <!-- Form -->
  <div class="main">
    <h1>Sign In</h1>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" value="alex@example.com" autocomplete="email" aria-label="Email address">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" value="secretpassword" autocomplete="current-password" aria-label="Password">
    </div>

    <a href="03-select-interest.html" style="text-decoration:none; display:block;">
      <div class="btn-grad-wrap">
        <button class="btn-signin">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </div>
    </a>

    <div class="divider">
      <div class="divider-line"></div>
      <span>or Sign In with</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-row" role="group" aria-label="Social sign-in options">
      <!-- Google -->
      <button class="social-btn" aria-label="Sign in with Google">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </button>
      <!-- Instagram -->
      <button class="social-btn" aria-label="Sign in with Instagram">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#f09433"/>
              <stop offset="50%"  stop-color="#dc2743"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="20" height="20" rx="6" stroke="url(#ig)" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" stroke="url(#ig)" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1.2" fill="#dc2743"/>
        </svg>
      </button>
      <!-- X -->
      <button class="social-btn" aria-label="Sign in with X">
        <svg viewBox="0 0 24 24" fill="white" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.259 5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </button>
      <!-- TikTok -->
      <button class="social-btn" aria-label="Sign in with TikTok">
        <svg viewBox="0 0 24 24" fill="white" aria-hidden="true">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.05a8.16 8.16 0 0 0 4.78 1.52V7.13a4.85 4.85 0 0 1-1.01-.44z"/>
        </svg>
      </button>
    </div>
  </div>

  <p class="bottom-nudge">No account? <a href="02-signup.html">Create one free</a></p>

</main>
</body>
</html>
