<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>InterestMatch — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      oklch(9% 0.010 268);
  --surface: oklch(13% 0.010 268);
  --border:  oklch(20% 0.008 268);
  --text:    oklch(96% 0.005 268);
  --muted:   oklch(55% 0.005 268);
  --accent:  oklch(62% 0.21 302);
}

html, body { height: 100%; -webkit-font-smoothing: antialiased; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  max-width: 430px;
  min-height: 100dvh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 52px 20px 0;
}

.logo-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--text);
  border: none;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; cursor: pointer;
}

.signup-link {
  display: flex; align-items: center; gap: 6px;
  font-size: 14px; font-weight: 700;
  color: var(--text);
  text-decoration: none;
  touch-action: manipulation;
}
.signup-link svg { opacity: 0.65; }

/* ── Wave decoration ── */
.wave-wrap {
  padding: 0 20px;
  margin-top: 28px;
  height: 60px;
  overflow: visible;
}
.wave-wrap svg { width: 100%; overflow: visible; }

/* ── Form area ── */
.form-body {
  flex: 1;
  padding: 4px 24px 40px;
  display: flex;
  flex-direction: column;
}

.page-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 48px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin-bottom: 36px;
}

/* ── Fields ── */
.field { margin-bottom: 16px; }

.field-label {
  display: block;
  font-size: 12px; font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.field-input {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 100px;
  padding: 15px 20px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s ease-out;
  touch-action: manipulation;
  -webkit-appearance: none;
}
.field-input::placeholder { color: var(--muted); }
.field-input:focus { border-color: var(--accent); }

.password-wrap { position: relative; }
.password-wrap .field-input { padding-right: 54px; }
.show-toggle {
  position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px;
  border-radius: 50%; border: none; background: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); cursor: pointer; touch-action: manipulation;
}

/* ── CTA button ── */
.btn-signin {
  width: 100%; margin-top: 10px; margin-bottom: 32px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 17px 0;
  border-radius: 100px; border: none;
  background: var(--accent);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px; font-weight: 800;
  color: oklch(96% 0.005 268);
  cursor: pointer; touch-action: manipulation;
  transition: opacity 0.15s ease-out;
  letter-spacing: 0.01em;
}
.btn-signin:active { opacity: 0.85; }

/* ── Divider ── */
.divider {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 24px;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }

/* ── Social buttons ── */
.social-row {
  display: flex; justify-content: center; gap: 14px;
}
.social-btn {
  width: 54px; height: 54px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; touch-action: manipulation;
  transition: border-color 0.15s, background 0.15s;
}
.social-btn:hover { border-color: var(--accent); background: var(--border); }

/* ── Footer ── */
.footer-text {
  text-align: center; font-size: 13px;
  color: var(--muted);
  margin-top: auto; padding-top: 28px;
}
.footer-text a { color: var(--text); font-weight: 700; text-decoration: none; }

/* ── Why we exist card ── */
.why-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px 22px;
  margin-bottom: 28px;
  display: flex; flex-direction: column; gap: 10px;
}
.why-item {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.why-dot { color: var(--accent); font-size: 10px; flex-shrink: 0; }

@keyframes _pi{from{opacity:0}to{opacity:1}}
@keyframes _po{from{opacity:1}to{opacity:0}}
body{animation:_pi .22s ease-out}
body.nav-out{animation:_po .16s ease-in forwards;pointer-events:none}
@media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important}body.nav-out{opacity:0}}
</style>
</head>
<body>

<header class="header">
  <button class="logo-btn" aria-label="Home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="3" fill="#0a0a12"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="#0a0a12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <a href="v2-03-categories.html" class="signup-link">
    Sign Up
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
</header>

<!-- Wave — violet to match accent -->
<div class="wave-wrap" aria-hidden="true">
  <svg viewBox="0 0 390 60" fill="none" preserveAspectRatio="none">
    <path d="M-10,30 C40,5 80,55 130,30 S200,5 250,30 S320,55 400,30"
      stroke="oklch(62% 0.21 302)" stroke-width="1.8" fill="none" opacity="0.9"/>
    <path d="M-10,42 C50,18 90,65 145,38 S215,12 265,42 S340,66 410,38"
      stroke="oklch(62% 0.21 302)" stroke-width="0.8" fill="none" opacity="0.35"/>
  </svg>
</div>

<main class="form-body">
  <div class="why-card" aria-label="How InterestMatch works">
    <div class="why-item"><span class="why-dot">✦</span> Tell us what you're into</div>
    <div class="why-item"><span class="why-dot">✦</span> We find a small group who gets it</div>
    <div class="why-item"><span class="why-dot">✦</span> One icebreaker. Real people. Go from there.</div>
  </div>
  <h1 class="page-title">Sign In</h1>

  <form action="v2-01-splash.html" method="get" novalidate>
    <div class="field">
      <label class="field-label" for="email">Email</label>
      <input class="field-input" id="email" type="email"
        placeholder="you@example.com"
        autocomplete="email"
        value="hannadowie@gmail.com">
    </div>

    <div class="field">
      <label class="field-label" for="password">Password</label>
      <div class="password-wrap">
        <input class="field-input" id="password" type="password"
          placeholder="••••••••••••"
          autocomplete="current-password"
          value="password123">
        <button type="button" class="show-toggle" id="showBtn" aria-label="Show password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-signin">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      Sign In
    </button>

    <div class="divider" role="separator">
      <div class="divider-line"></div>
      <span class="divider-text">or Sign In with</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-row" role="group" aria-label="Social sign-in options">
      <button type="button" class="social-btn" aria-label="Sign in with Google">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
      <button type="button" class="social-btn" aria-label="Sign in with Instagram">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="5" stroke="oklch(75% 0.18 15)" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" stroke="oklch(75% 0.18 15)" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1.2" fill="oklch(75% 0.18 15)"/>
        </svg>
      </button>
      <button type="button" class="social-btn" aria-label="Sign in with X">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--text)">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.626 5.905-5.626zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </button>
      <button type="button" class="social-btn" aria-label="Sign in with TikTok">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--text)">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34l-.01-8.83a8.18 8.18 0 0 0 4.78 1.52V4.55a4.85 4.85 0 0 1-1-.14v2.28z"/>
        </svg>
      </button>
    </div>
  </form>

  <p class="footer-text">Don't have an account? <a href="v2-03-categories.html">Create one free</a></p>
</main>

<script>
function navigate(url){
  document.body.classList.add('nav-out');
  setTimeout(()=>location.href=url,160);
}
document.addEventListener('click',e=>{
  if(e.defaultPrevented)return;
  const a=e.target.closest('a[href]');
  if(!a)return;
  const h=a.getAttribute('href');
  if(!h||/^(https?:|mailto:|#)/.test(h))return;
  e.preventDefault();
  navigate(h);
});
document.querySelector('form').addEventListener('submit',e=>{
  e.preventDefault();
  navigate('v2-01-splash.html');
});
const btn = document.getElementById('showBtn');
const pwd = document.getElementById('password');
btn.addEventListener('click', () => {
  const showing = pwd.type === 'text';
  pwd.type = showing ? 'password' : 'text';
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
});
</script>
</body>
</html>
