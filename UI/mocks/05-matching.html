<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterestMatch — Finding Your People</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      oklch(10% 0.012 268);
    --surface: oklch(14% 0.012 268);
    --text:    oklch(95% 0.005 268);
    --muted:   oklch(60% 0.005 268);
    --accent:  oklch(62% 0.22 252);  /* gaming blue — adjust based on selected category */
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  .screen {
    min-height: 100dvh; max-width: 430px; margin: 0 auto; padding: 0 24px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0; position: relative; overflow: hidden; text-align: center;
  }
  /* Background accent glow */
  .bg-glow {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, color-mix(in oklch, var(--accent) 20%, transparent) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }
  /* Radar rings */
  .radar { position: relative; width: 200px; height: 200px; margin: 0 auto 48px; z-index: 1; }
  .ring {
    position: absolute; border-radius: 50%; border: 1.5px solid;
    border-color: color-mix(in oklch, var(--accent) 30%, transparent);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    animation: pulse-out 2.4s ease-out infinite;
  }
  .ring:nth-child(1) { width: 60px;  height: 60px;  animation-delay: 0s; }
  .ring:nth-child(2) { width: 110px; height: 110px; animation-delay: 0.5s; }
  .ring:nth-child(3) { width: 160px; height: 160px; animation-delay: 1s; }
  .ring:nth-child(4) { width: 210px; height: 210px; animation-delay: 1.5s; }
  @keyframes pulse-out {
    0%   { opacity: 0.8; }
    50%  { opacity: 0.3; }
    100% { opacity: 0.8; }
  }
  /* Center dot */
  .center-dot {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 8px color-mix(in oklch, var(--accent) 20%, transparent);
    animation: dot-pulse 2.4s ease-in-out infinite;
  }
  .center-dot svg { width: 20px; height: 20px; color: oklch(10% 0.012 268); }
  @keyframes dot-pulse {
    0%, 100% { box-shadow: 0 0 0 8px color-mix(in oklch, var(--accent) 20%, transparent); }
    50%       { box-shadow: 0 0 0 16px color-mix(in oklch, var(--accent) 10%, transparent); }
  }
  /* Member avatars appearing around ring */
  .member {
    position: absolute; width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--bg); display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; opacity: 0;
  }
  .m1 { top: 2%;  left: 50%; transform: translateX(-50%); background: oklch(57% 0.22 14);  animation: pop-in 0.4s ease-out 1.8s forwards; }
  .m2 { top: 50%; right: -4%; transform: translateY(-50%); background: oklch(78% 0.17 95);  animation: pop-in 0.4s ease-out 2.2s forwards; color: oklch(12% 0.01 95); }
  .m3 { bottom: 4%; left: 20%; background: oklch(66% 0.20 142); animation: pop-in 0.4s ease-out 2.6s forwards; }
  @keyframes pop-in {
    from { opacity: 0; transform: translateX(-50%) scale(0.5); }
    to   { opacity: 1; transform: translateX(-50%) scale(1); }
  }
  /* Ensure individual transforms don't clash */
  .m2 { animation-name: pop-in-right; }
  .m3 { animation-name: pop-in-bl; }
  @keyframes pop-in-right {
    from { opacity: 0; transform: translateY(-50%) scale(0.5); }
    to   { opacity: 1; transform: translateY(-50%) scale(1); }
  }
  @keyframes pop-in-bl {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }
  /* Text content */
  .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .category-chip {
    display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px 5px 10px;
    border-radius: 99px; background: color-mix(in oklch, var(--accent) 14%, transparent);
    border: 1px solid color-mix(in oklch, var(--accent) 35%, transparent);
    color: var(--accent); font-size: 12px; font-weight: 600; margin-bottom: 4px;
  }
  .category-chip svg { width: 14px; height: 14px; }
  h1 { font-family: 'Righteous', sans-serif; font-size: 28px; line-height: 1.2; color: var(--text); }
  .subtitle { font-size: 15px; color: var(--muted); line-height: 1.6; max-width: 280px; }
  /* Status steps */
  .steps { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; margin-top: 16px; }
  .step { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--muted); }
  .step-icon {
    width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px;
    background: var(--surface);
  }
  .step.done .step-icon { border-color: var(--accent); background: color-mix(in oklch, var(--accent) 20%, transparent); color: var(--accent); }
  .step.done { color: var(--text); }
  .step.active .step-icon { border-color: var(--accent); animation: spin 1s linear infinite; }
  .step.active { color: var(--text); }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* CTA (appears after matching) */
  .cta-area { position: relative; z-index: 1; padding-top: 40px; width: 100%; display: flex; flex-direction: column; gap: 12px; opacity: 0; animation: fade-in 0.5s ease-out 3.5s forwards; }
  .btn-primary {
    width: 100%; height: 56px; border-radius: 14px; background: var(--accent); border: none;
    color: oklch(98% 0.005 268); font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: transform 120ms ease-out, opacity 120ms ease-out; touch-action: manipulation;
  }
  .btn-primary:active { transform: scale(0.97); opacity: 0.88; }
  .btn-primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .match-count { font-size: 13px; color: var(--muted); }
  .match-count strong { color: var(--accent); }
  @keyframes fade-in { to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .ring, .bg-glow, .center-dot, .cta-area, .m1, .m2, .m3 { animation: none; opacity: 1; }
  }
</style>
</head>
<body>
<main class="screen" role="main" aria-label="Finding your match — please wait">
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="radar" aria-hidden="true">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="center-dot">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
    </div>
    <div class="member m1" aria-hidden="true">J</div>
    <div class="member m2" aria-hidden="true">S</div>
    <div class="member m3" aria-hidden="true">K</div>
  </div>

  <div class="content">
    <div class="category-chip" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
      Gaming
    </div>
    <h1>Finding your people</h1>
    <p class="subtitle">We're reading your bio and matching you with the right group.</p>

    <div class="steps" role="status" aria-live="polite" aria-label="Matching progress">
      <div class="step done">
        <div class="step-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Bio submitted</span>
      </div>
      <div class="step done">
        <div class="step-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Analysing your taste</span>
      </div>
      <div class="step active" aria-current="step">
        <div class="step-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <span>Matching you with a group</span>
      </div>
    </div>
  </div>

  <div class="cta-area">
    <p class="match-count"><strong>3 gamers</strong> matched with your vibe</p>
    <a href="06-group-chat.html" style="text-decoration:none; display:block;">
      <button class="btn-primary">Join your group chat</button>
    </a>
  </div>
</main>
</body>
</html>
