<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterestMatch — Gaming Bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      oklch(10% 0.012 268);
    --surface: oklch(14% 0.012 268);
    --border:  oklch(22% 0.008 268);
    --text:    oklch(95% 0.005 268);
    --muted:   oklch(60% 0.005 268);
    --accent:  oklch(62% 0.22 252);  /* electric blue — gaming */
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  .screen { min-height: 100dvh; max-width: 430px; margin: 0 auto; padding: 0 24px 40px; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 4px; }
  .back-btn {
    width: 40px; height: 40px; border-radius: 10px; background: var(--surface); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--text); transition: background 150ms; touch-action: manipulation;
  }
  .back-btn:hover { background: oklch(18% 0.012 268); }
  .back-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .back-btn svg { width: 20px; height: 20px; }
  .step-label { font-size: 13px; color: var(--muted); font-weight: 500; }
  .progress-wrap { padding: 16px 0 0; }
  .progress-track { height: 4px; border-radius: 99px; background: oklch(20% 0.008 268); }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--accent); }
  .cat-badge {
    display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px 6px 10px;
    border-radius: 99px; background: color-mix(in oklch, var(--accent) 14%, transparent);
    border: 1px solid color-mix(in oklch, var(--accent) 35%, transparent);
    color: var(--accent); font-size: 13px; font-weight: 600; margin-top: 24px; width: fit-content;
  }
  .cat-badge svg { width: 16px; height: 16px; }
  .header { padding: 14px 0 28px; }
  .header h1 { font-family: 'Righteous', sans-serif; font-size: 26px; line-height: 1.25; color: var(--text); }
  .header p { font-size: 14px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .questions { display: flex; flex-direction: column; gap: 24px; flex: 1; }
  .question-card { display: flex; flex-direction: column; gap: 10px; }
  .question-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .q-number { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); min-width: 28px; padding-top: 1px; }
  .q-text { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.45; flex: 1; }
  .skip-btn {
    font-size: 12px; font-weight: 500; color: var(--muted); background: none; border: none; cursor: pointer;
    padding: 2px 0; white-space: nowrap; touch-action: manipulation; transition: color 150ms;
  }
  .skip-btn:hover { color: var(--text); }
  .skip-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 14px; border-radius: 99px; font-size: 13px; font-weight: 500;
    background: oklch(18% 0.008 268); border: 1.5px solid var(--border); color: var(--muted);
    cursor: pointer; transition: border-color 150ms, color 150ms, background 150ms; touch-action: manipulation;
  }
  .chip:hover, .chip.selected { border-color: var(--accent); color: var(--accent); background: color-mix(in oklch, var(--accent) 12%, transparent); }
  .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .q-input {
    width: 100%; min-height: 52px; border-radius: 12px; background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text); font-family: 'Poppins', sans-serif; font-size: 15px; padding: 14px 16px;
    resize: none; transition: border-color 150ms; outline: none; line-height: 1.5;
  }
  .q-input:focus { border-color: var(--accent); }
  .q-input::placeholder { color: var(--muted); }
  .q-input.filled { border-color: color-mix(in oklch, var(--accent) 50%, transparent); }
  /* Shame card */
  .shame-card {
    background: color-mix(in oklch, var(--accent) 6%, var(--surface)); border-radius: 14px;
    border: 1.5px solid color-mix(in oklch, var(--accent) 25%, transparent); padding: 16px 16px 14px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .shame-header { display: flex; align-items: center; gap: 8px; }
  .shame-icon { font-size: 18px; line-height: 1; }
  .shame-title { font-size: 13px; font-weight: 600; color: var(--accent); }
  .cta-area { padding-top: 32px; display: flex; flex-direction: column; gap: 12px; }
  .btn-primary {
    width: 100%; height: 56px; border-radius: 14px; background: var(--accent); border: none;
    color: oklch(98% 0.005 268); font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: transform 120ms ease-out, opacity 120ms ease-out; touch-action: manipulation;
  }
  .btn-primary:active { transform: scale(0.97); opacity: 0.88; }
  .btn-primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .hint { font-size: 12px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<main class="screen" role="main">
  <div class="topbar">
    <a href="03-select-interest.html" aria-label="Back to categories">
      <button class="back-btn" tabindex="-1" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </a>
    <span class="step-label">Step 1 of 2</span>
  </div>

  <div class="progress-wrap" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Profile completion 50%">
    <div class="progress-track"><div class="progress-fill" style="width: 50%"></div></div>
  </div>

  <div class="cat-badge" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
    Gaming
  </div>

  <div class="header">
    <h1>Your gaming bio</h1>
    <p>No judgement — even if it's FIFA on beginner mode.</p>
  </div>

  <div class="questions">

    <div class="question-card">
      <div class="question-top">
        <span class="q-number">01</span>
        <span class="q-text">What's your favourite game genre?</span>
        <button class="skip-btn" aria-label="Skip question 1">Skip</button>
      </div>
      <div class="chips" role="group" aria-label="Game genres">
        <button class="chip" aria-pressed="false">RPG</button>
        <button class="chip selected" aria-pressed="true">FPS</button>
        <button class="chip" aria-pressed="false">Battle Royale</button>
        <button class="chip" aria-pressed="false">Strategy</button>
        <button class="chip" aria-pressed="false">Sports</button>
        <button class="chip" aria-pressed="false">MOBA</button>
        <button class="chip" aria-pressed="false">Indie</button>
        <button class="chip" aria-pressed="false">Horror</button>
        <button class="chip" aria-pressed="false">Simulation</button>
      </div>
    </div>

    <div class="question-card">
      <div class="question-top">
        <span class="q-number">02</span>
        <span class="q-text">What's a game you've been playing recently?</span>
        <button class="skip-btn" aria-label="Skip question 2">Skip</button>
      </div>
      <textarea class="q-input filled" rows="2" placeholder="e.g. Baldur's Gate 3, Warzone, Stardew Valley…" aria-label="Game you've been playing recently">Valorant — I'm in Silver but I swear I should be Gold</textarea>
    </div>

    <div class="question-card">
      <div class="question-top">
        <span class="q-number">03</span>
        <span class="q-text">What's a game you're really bad at?</span>
        <button class="skip-btn" aria-label="Skip question 3">Skip</button>
      </div>
      <div class="shame-card">
        <div class="shame-header">
          <svg class="shame-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span class="shame-title">The Shame Game</span>
        </div>
        <textarea class="q-input" rows="2" placeholder="e.g. Any Dark Souls game, fighting games, golf…" aria-label="Game you're really bad at"></textarea>
      </div>
    </div>

  </div>

  <div class="cta-area">
    <a href="05-matching.html" style="text-decoration:none; display:block;">
      <button class="btn-primary">Find my gaming people</button>
    </a>
    <p class="hint">Your answers are only shared with your matched group</p>
  </div>
</main>
<script>
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const pressed = chip.getAttribute('aria-pressed') === 'true';
      chip.setAttribute('aria-pressed', String(!pressed));
      chip.classList.toggle('selected', !pressed);
    });
  });
</script>
</body>
</html>
